apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: opsforge-system
spec:
  selector:
    app: opsforge-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsforge-backend
  namespace: opsforge-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsforge-backend
  template:
    metadata:
      labels:
        app: opsforge-backend
    spec:
      serviceAccountName: opsforge-backend
      initContainers:
        - name: migrate
          image: ghcr.io/biraj49/opsforge-backend:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: opsforge-config
            - secretRef:
                name: opsforge-secret
      containers:
        - name: backend
          image: ghcr.io/biraj49/opsforge-backend:latest
          imagePullPolicy: Always
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: opsforge-config
            - secretRef:
                name: opsforge-secret
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 1Gi
