apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opsforge
  namespace: opsforge-system
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
