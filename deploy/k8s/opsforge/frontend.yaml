apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: opsforge-system
spec:
  selector:
    app: opsforge-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsforge-frontend
  namespace: opsforge-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsforge-frontend
  template:
    metadata:
      labels:
        app: opsforge-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/biraj49/opsforge-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
