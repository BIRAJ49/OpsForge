apiVersion: v1
kind: Secret
metadata:
  name: opsforge-secret
  namespace: opsforge-system
type: Opaque
stringData:
  POSTGRES_USER: opsforge
  POSTGRES_PASSWORD: replace-with-postgres-password
  POSTGRES_DB: opsforge
  DATABASE_URL: postgresql://opsforge:replace-with-postgres-password@postgres:5432/opsforge
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: replace-with-jwt-secret
  JWT_ALGORITHM: HS256
  ADMIN_EMAIL: replace-with-admin-email
  ADMIN_PASSWORD: replace-with-admin-password
  ADMIN_NAME: OpsForge Admin
  GITHUB_OAUTH_CLIENT_ID: replace-with-github-oauth-client-id
  GITHUB_OAUTH_CLIENT_SECRET: replace-with-github-oauth-client-secret
  GITHUB_TOKEN: ""
  GHCR_TOKEN: ""
  ARGOCD_TOKEN: ""
  ARGOCD_USERNAME: ""
  ARGOCD_PASSWORD: ""
  OPENROUTER_API_KEY: ""
  SMTP_HOST: ""
  SMTP_PORT: ""
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_FROM_EMAIL: contact@example.com
  RESEND_API_KEY: ""
