name: OpsForge CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: opsforge-backend
  FRONTEND_IMAGE: opsforge-frontend

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "backend=${REGISTRY}/${OWNER_LC}/${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/${OWNER_LC}/${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:latest
            ${{ steps.images.outputs.backend }}:${{ steps.images.outputs.short_sha }}
          cache-from: type=gha,scope=opsforge-backend
          cache-to: type=gha,scope=opsforge-backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:latest
            ${{ steps.images.outputs.frontend }}:${{ steps.images.outputs.short_sha }}
          cache-from: type=gha,scope=opsforge-frontend
          cache-to: type=gha,scope=opsforge-frontend,mode=max

  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/opsforge_ec2
          chmod 600 ~/.ssh/opsforge_ec2
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Restart OpsForge deployments
        run: |
          ssh -i ~/.ssh/opsforge_ec2 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
            set -euo pipefail
            kubectl rollout restart deployment/opsforge-backend -n opsforge-system
            kubectl rollout restart deployment/opsforge-frontend -n opsforge-system
            kubectl rollout status deployment/opsforge-backend -n opsforge-system --timeout=180s
            kubectl rollout status deployment/opsforge-frontend -n opsforge-system --timeout=180s
          EOF
