services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opsforge
      POSTGRES_PASSWORD: opsforge
      POSTGRES_DB: opsforge
    ports:
      - "5432:5432"
    volumes:
      - opsforge-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsforge -d opsforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://opsforge:opsforge@postgres:5432/opsforge
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  opsforge-postgres:
